<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" description="task manager application demo" />
    <title>task manager</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/fontawesome.min.css"
      integrity="sha512-v8QQ0YQ3H4K6Ic3PJkym91KoeNT5S3PnDKvqnwqFD1oiqIl653crGZplPdU5KKtHjO0QKcQ2aUlQZYjHczkmGw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="app">
      <header>
        <h1><i class="fas fa-check-circle"></i>My Tasks</h1>
        <p>Monday, Apr 2</p>
      </header>
      <div class="todo-input">
        <input
          type="text"
          id="task-input"
          placeholder="what do you need to do?"
        />
        <button id="add-task"><i class="fas fa-plus"></i></button>
      </div>

      <div class="filters">
        <span class="filter active" data-filter="all">All</span>
        <span class="filter" data-filter="active">Active</span>
        <span class="filter" data-filter="completed">Completed</span>
      </div>
      <div class="todos-container">
        <ul id="todos-list">
          <!-- li will be inserted here -->
        </ul>
        <div class="empty-state hidden">
          <i class="fas fa-clipboard-list"></i>
          <p>No tasks are here yet</p>
        </div>
      </div>

      <footer>
        <p id="items-left">0 items-left</p>
        <button id="clear-completed">Clear completed</button>
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
